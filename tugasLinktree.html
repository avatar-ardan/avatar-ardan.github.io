    <style>
        body {
            background: #a7a6a4;
            font-family: 'Bitter', serif;
        }
        .page {
            display: flex;
            justify-content: center;
            padding: 40px 16px 0;
            min-height: 100vh;
        }

        .card {
            background: #EAE8E4;
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-width: 465px;
            box-shadow: 0 24px 48px rgba(0,0,0,.18);
            overflow: hidden;
            padding-bottom: 0;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            padding: 22px;
        }

        .icon-linktree {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255,255,255,.7);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 2px 16px 4px;
        }

        .avatar {
            width: 77px;
            height: 77px;
            border-radius: 50%;
            object-fit: cover;
        }

        .btn.btn-lt {
            display: flex;
            align-items: center;
            width: 100%;
            height: 50px;
            background: #70764D;
            border-radius: 0%;
            position: relative;
            padding: 0;
            margin-bottom: 13px;
        }

        .btn.btn-lt:hover {
            background: #7c8359;
        }

        .icon {
            width: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon img {
            width: 22px;
            height: 22px;
            filter: brightness(0) invert(1);
        }
        .label {
            position: absolute;
            left: 0;
            right: 0;
            text-align: center;
            padding: 0 40px;
            color: #fff; 
            font-size: 14px;
            font-weight: 500;
        }   

        .dots {
            position: absolute;
            right: 15px;
            top: 35%;
            margin-top: -5px;
            color: #cccccc; 
        }

        .username {
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 1px;
            padding-top: 7px;
        }

        .bio {
            font-size: 14px;
            font-weight: 530;
            margin: 0;
            line-height: 1.5;
            padding: 0 16px;
        }

        .links {
            padding: 0 20px;
            margin-top: 4px;
        }

        .subhead {
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            margin  : 14px 0 14px;
        }

        .footer {
            text-align: center;
            padding: 28px 16px 32px;
        }

        .btn.btn-footer {
            height: 44px;
            padding: 0 12px;
            background: #fff;
            border: 1px solid #dce0d7;
            border-radius: 9999px;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 14px;
            font-weight: 900;
            color: #000;
            box-shadow: 0 4px 8px rgba(0,0,0,.12);
        }

        .footer-small {
            margin-top: 10px;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 9px;
            color: rgb(0, 0, 0);
            font-weight: 500;
        }

        @media (max-width: 480px) {
            body {
                background: #EAE8E4;
            }
            .page {
                padding: 0;
            }
             .card {
                border-radius: 0;
                max-width: 100%;
             }
        }
    </style>
</head>
